# Hibernate Configuration
# As informacoes de conexao sao carregadas via variaveis de ambiente ou arquivo local
# Por seguranca, nao coloque senhas diretamente aqui

# Configurações do banco de dados (usam variáveis de ambiente)
hibernate.connection.driver_class=org.postgresql.Driver
hibernate.connection.url=${DB_URL}
hibernate.connection.username=${DB_USER}
hibernate.connection.password=${DB_PASSWORD}

# Dialeto do Hibernate para PostgreSQL
hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configurações gerais
hibernate.show_sql=false
hibernate.format_sql=true
hibernate.use_sql_comments=true
hibernate.generate_statistics=false

# Pool de conexões
hibernate.connection.pool_size=5
hibernate.max_fetch_depth=3

# DDL - Uncomment se quiser auto-criar tabelas (use com cautela em produção)
# hibernate.hbm2ddl.auto=validate
# hibernate.hbm2ddl.auto=update
# hibernate.hbm2ddl.auto=create-drop
