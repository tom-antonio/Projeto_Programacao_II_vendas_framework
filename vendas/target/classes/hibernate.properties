# Hibernate Configuration
# As informacoes de conexao sao carregadas via variaveis de ambiente ou arquivo local
# Por seguranca, nao coloque senhas diretamente aqui

# Configurações do banco de dados
hibernate.connection.driver_class=org.postgresql.Driver
hibernate.connection.url=jdbc:postgresql://localhost:5432/SisCom_comercial_prog2_Luan
hibernate.connection.username=postgres
hibernate.connection.password=201706279

# Dialeto do Hibernate para PostgreSQL
hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configurações gerais
hibernate.show_sql=false
hibernate.format_sql=true
hibernate.use_sql_comments=true
hibernate.generate_statistics=false

# Pool de conexões
hibernate.connection.pool_size=5
hibernate.max_fetch_depth=3

# DDL - cria/atualiza automaticamente as tabelas no banco ao subir a aplicação
hibernate.hbm2ddl.auto=update
